<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Internal Server Error / خطأ داخلي في الخادم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle at 50% 50%, #450a0a 0%, #0c0202 100%);
            color: #ffffff;
            font-family: 'Outfit', 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100%" height="100%" fill="none"/><path d="M0,50 Q25,25 50,50 T100,50" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="1"/></svg>');
            opacity: 0.8;
            z-index: 1;
        }
        .error-container {
            text-align: center;
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 3rem 2rem;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            z-index: 10;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
            animation: pulse 3s infinite alternate;
        }
        .error-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #f1f5f9;
            margin-bottom: 1rem;
        }
        .error-desc {
            font-size: 1rem;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 2.5rem;
            padding: 0 1rem;
        }
        .btn-home {
            background: linear-gradient(135deg, #7f1d1d 0%, #b91c1c 100%);
            color: #ffffff;
            text-decoration: none;
            padding: 0.9rem 2.2rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(185, 28, 28, 0.3);
            border: 1px solid rgba(255,255,255,0.08);
        }
        .btn-home:hover {
            background: linear-gradient(135deg, #b91c1c 0%, #dc2626 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(185, 28, 28, 0.4);
        }
        .btn-home:active {
            transform: translateY(0);
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.03); }
        }
        @media (max-width: 480px) {
            .error-code { font-size: 6rem; }
            .error-title { font-size: 1.4rem; }
            .error-desc { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">500</div>
        <h1 class="error-title">Internal Server Error / خطأ داخلي في الخادم</h1>
        <p class="error-desc">
            Something went wrong on our end. Please try reloading the page or check back later.<br>
            حدث خطأ غير متوقع في الخادم لدينا. يرجى محاولة تحديث الصفحة أو العودة في وقت لاحق.
        </p>
        <a href="/" class="btn-home">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Back to Homepage / العودة للرئيسية</span>
        </a>
    </div>
</body>
</html>
